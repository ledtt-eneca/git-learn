<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Meetup — Visual Deck</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-soft: #1c2128;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --green: #238636;
      --blue: #58a6ff;
      --purple: #a371f7;
      --yellow: #f2cc60;
      --red: #f85149;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 0%, #1c2430 0%, var(--bg) 48%);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      justify-items: center;
      align-items: center;
      padding: 14px;
      gap: 14px;
    }

    .deck {
      width: min(95vw, 1280px);
      aspect-ratio: 16 / 9;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.48);
      overflow: hidden;
      position: relative;
    }

    #slide {
      width: 100%;
      height: 100%;
      padding: 42px 52px 58px;
      overflow: hidden;
      position: relative;
      animation: fade 160ms ease;
    }

    @keyframes fade {
      from {
        opacity: 0.5;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tiny {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .title {
      font-size: 56px;
      font-weight: 800;
      margin: 10px 0 8px;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .subtitle {
      color: var(--muted);
      font-size: 24px;
      font-weight: 400;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 24px;
      height: calc(100% - 120px);
      margin-top: 18px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .step {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      text-align: left;
    }

    .step i {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .step h4 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #fff;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .mono {
      font-family: "JetBrains Mono", Consolas, monospace;
    }

    .cmd {
      border: 1px solid var(--border);
      background: #0f141b;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      color: #c9d1d9;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      background: #121820;
      color: #d0d7de;
      font-size: 13px;
      font-weight: 600;
    }

    .git-map {
      position: relative;
      height: 100%;
      border-radius: 16px;
      background: linear-gradient(180deg, #121821, #10151d);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .line {
      position: absolute;
      height: 6px;
      border-radius: 6px;
      background: #3d444d;
    }

    .node {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 4px solid #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      font-family: "JetBrains Mono", Consolas, monospace;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      z-index: 3;
    }

    .node small {
      position: absolute;
      top: 58px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;
      font-family: Inter, sans-serif;
      font-weight: 600;
    }

    .n-main {
      background: var(--green);
    }

    .n-feature {
      background: var(--purple);
    }

    .n-head {
      box-shadow: 0 0 0 10px rgba(242, 204, 96, 0.12);
      border-color: var(--yellow);
    }

    .n-copy {
      background: transparent;
      border-color: var(--purple);
      border-style: dashed;
      color: var(--purple);
    }

    .label {
      position: absolute;
      font-size: 14px;
      color: #c9d1d9;
      font-family: "JetBrains Mono", Consolas, monospace;
      background: rgba(12, 16, 22, 0.8);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      z-index: 4;
    }

    .arrow {
      position: absolute;
      border-top: 2px dashed var(--purple);
      transform-origin: left center;
      z-index: 2;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: -8px;
      top: -4px;
      border-left: 8px solid var(--purple);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .kpi>div {
      border: 1px solid var(--border);
      background: #111720;
      border-radius: 12px;
      padding: 12px;
    }

    .kpi h5 {
      margin: 0 0 6px;
      color: #fff;
      font-size: 15px;
    }

    .kpi p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      width: min(95vw, 1280px);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .nav {
      display: inline-flex;
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: 120ms ease;
    }

    button:hover:not(:disabled) {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(163, 113, 247, 0.22);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      width: min(46vw, 500px);
      height: 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #111720;
      overflow: hidden;
    }

    .bar>div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      transition: width 170ms ease;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="deck">

    <div class="controls">
      <div class="nav">

        <button id="nextBtn" type="button">Вперёд →</button>
      </div>
      <div class="meta">
        <span id="counter">1 / 1</span>
        <div class="bar">
          <div id="progress"></div>
        </div>
      </div>
      <div class="nav">
        <button id="firstBtn" type="button">В начало</button>
        <button id="lastBtn" type="button">В конец</button>

    const state = { index: 0 };
    const slideEl = document.getElementById("slide");
    const counterEl = document.getElementById("counter");
    const progressEl = document.getElementById("progress");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const firstBtn = document.getElementById("firstBtn");
    const lastBtn = document.getElementById("lastBtn");

    function render() {
      slideEl.innerHTML = slides[state.index];
      counterEl.textContent = `${state.index + 1} / ${slides.length}`;
      progressEl.style.width = `${((state.index + 1) / slides.length) * 100}%`;

      prevBtn.disabled = state.index === 0;
      firstBtn.disabled = state.index === 0;
      nextBtn.disabled = state.index === slides.length - 1;
      lastBtn.disabled = state.index === slides.length - 1;
    }

    function goTo(next) {
      const clamped = Math.max(0, Math.min(next, slides.length - 1));
      state.index = clamped;
      render();
    }

    prevBtn.addEventListener("click", () => goTo(state.index - 1));
    nextBtn.addEventListener("click", () => goTo(state.index + 1));
    firstBtn.addEventListener("click", () => goTo(0));
    lastBtn.addEventListener("click", () => goTo(slides.length - 1));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(state.index + 1);
      } else if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(state.index - 1);
      } else if (event.key === "Home") {
        event.preventDefault();
        goTo(0);
      } else if (event.key === "End") {
        event.preventDefault();
        goTo(slides.length - 1);
      }
    });

    render();
